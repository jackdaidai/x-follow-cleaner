<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:440px;height:280px;background:radial-gradient(120% 120% at 0% 0%,#1b2740 0%,#0f1726 60%);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",Arial,sans-serif;
       color:#fff;padding:26px 28px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
  .top{display:flex;align-items:center;gap:12px}
  .mark{width:42px;height:42px;border-radius:10px;background:#fff;color:#0f1726;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800}
  h1{font-size:21px;line-height:1.15;letter-spacing:.3px}
  .mid{margin-top:2px}
  .mid p{color:#cdd9ec;font-size:14px;line-height:1.5}
  .mid .hl{color:#5aa2f5;font-weight:700}
  .feat{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
  .feat span{font-size:11.5px;font-weight:700;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:9999px;padding:5px 11px;color:#dfe8f6}
  .foot{display:flex;align-items:center;justify-content:space-between}
  .foot .tag{font-size:12px;font-weight:700;color:#9fb0c9}
  .foot .badge{font-size:12px;font-weight:800;color:#0f1726;background:#5aa2f5;border-radius:9999px;padding:5px 12px}
</style>
</head>
<body>
  <div class="top">
    <div class="mark">𝕏</div>
    <h1>Follow Cleaner for X</h1>
  </div>
  <div class="mid">
    <p>Find who <span class="hl">doesn't follow you back</span> → review &amp; batch-unfollow. Or batch-follow from anyone's followers.</p>
    <div class="feat">
      <span>🔒 100% local</span>
      <span>No login</span>
      <span>Open source</span>
    </div>
  </div>
  <div class="foot">
    <span class="tag">Userscript · Chrome extension</span>
    <span class="badge">Free</span>
  </div>
</body>
</html>
